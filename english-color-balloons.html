<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>颜色气球 - 竹竹的游乐场</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-page" style="background: linear-gradient(180deg, #E8F5E9, #C8E6C9)">
  <div class="game-header">
    <a class="back-btn" href="index.html">🏠</a>
    <div class="game-star-bar"><span class="star-icon">⭐</span><span class="star-count">0</span></div>
    <span class="game-title-float">🌈 Color Pop</span>
  </div>

  <div class="game-dom-area">
    <div class="english-shell">
      <div class="english-prompt">
        <div class="english-prompt-kicker" id="kicker">Color Pop</div>
        <div class="english-prompt-text" id="promptText">Touch red</div>
        <div class="english-prompt-hint" id="promptHint">Pop the right balloon.</div>
        <button class="english-replay-btn" id="replayBtn" type="button">🔊 Say color</button>
      </div>
      <div class="english-play-grid" id="playGrid"></div>
      <div class="english-footer-tip">Hear the color and pop the match.</div>
    </div>
  </div>

  <div class="zhuzhu-stamp">🎍 竹竹</div>

  <script src="common.js"></script>
  <script src="english-common.js"></script>
  <script>
    ZZ.updateStarDisplay();

    const colors = EnglishGames.packs.colors;
    const kicker = document.getElementById('kicker');
    const promptText = document.getElementById('promptText');
    const promptHint = document.getElementById('promptHint');
    const replayBtn = document.getElementById('replayBtn');
    const playGrid = document.getElementById('playGrid');
    let index = 0;
    let target = colors[0];

    function nextRound() {
      target = colors[index % colors.length];
      index++;
      EnglishGames.setPrompt(kicker, promptText, promptHint, 'Color Pop', `Touch ${target.word}`, 'Pop the right balloon.');
      playGrid.innerHTML = '';
      EnglishGames.shuffle(colors).forEach(item => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'english-card english-balloon-card';
        card.style.background = `linear-gradient(180deg, ${item.soft}, ${item.color})`;
        card.innerHTML = `<div class="english-card-emoji">${item.emoji}</div><div class="english-card-word">${item.word}</div><div class="english-card-sub">tap tap</div>`;
        card.addEventListener('pointerdown', () => {
          if (item.word === target.word) {
            card.classList.add('popped');
            ZZ.playPop();
            EnglishGames.rewardCard(card, 1);
            EnglishGames.speakEnglish(item.word);
            EnglishGames.setPrompt(kicker, promptText, promptHint, 'Color Pop', `${item.word}!`, 'Nice pop!');
            setTimeout(nextRound, 420);
          } else {
            EnglishGames.pulse(card, 'miss', 260);
            ZZ.playBubble();
            EnglishGames.setPrompt(kicker, promptText, promptHint, 'Color Pop', `Touch ${target.word}`, 'Try again.');
            EnglishGames.speakEnglish(target.word);
          }
        });
        playGrid.appendChild(card);
      });
    }

    replayBtn.addEventListener('pointerdown', () => {
      ZZ.playBubble();
      EnglishGames.speakEnglish(target.word);
    });

    nextRound();
  </script>
</body>
</html>
