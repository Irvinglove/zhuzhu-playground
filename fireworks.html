<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>烟花秀 - 竹竹的游乐场</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-page" style="background:#0D1B2A">

  <div class="game-header">
    <a class="back-btn" href="index.html" style="background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3)">🏠</a>
    <div class="game-star-bar" style="background:rgba(0,0,0,0.3)">
      <span class="star-icon">⭐</span>
      <span class="star-count">0</span>
    </div>
    <span class="game-title-float" style="color:rgba(255,255,255,0.4)">🎆 烟花秀</span>
  </div>

  <canvas class="game-canvas" id="canvas"></canvas>
  <div class="zhuzhu-stamp" style="color:rgba(255,255,255,0.15)">🎍 竹竹</div>

  <script src="common.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const rockets = [];
    const particles = [];

    ZZ.updateStarDisplay();

    function resize() {
      const s = ZZ.resizeCanvas(canvas);
      W = s.w; H = s.h;
    }
    resize();
    window.addEventListener('resize', resize);

    // 烟花类型
    const fireworkTypes = ['sphere', 'ring', 'heart', 'chrysanthemum', 'willow', 'star', 'zhuzhu'];

    class Rocket {
      constructor(x, targetY) {
        this.x = x;
        this.y = H;
        this.targetY = targetY;
        this.vy = -ZZ.rand(10, 16);
        this.color = ZZ.randColor();
        this.alive = true;
        this.trail = [];
        this.type = Math.random() < 0.12 ? 'zhuzhu' : fireworkTypes[Math.floor(Math.random() * 6)];
      }
      update() {
        this.trail.push({ x: this.x, y: this.y, life: 1 });
        if (this.trail.length > 16) this.trail.shift();
        this.trail.forEach(t => t.life -= 0.06);
        this.y += this.vy;
        this.vy += 0.2;
        if (this.vy >= 0 || this.y <= this.targetY) {
          this.explode();
          this.alive = false;
        }
      }
      explode() {
        const cx = this.x;
        const cy = this.y;
        const color = this.color;
        const type = this.type;

        if (type === 'zhuzhu') {
          // 竹竹烟花 - 心形 + 文字
          this.emitHeart(cx, cy, '#FF6B9D', 50);
          showZhuzhuFirework(cx, cy);
          ZZ.flyStar(cx, cy - 30, 5);
        } else if (type === 'sphere') {
          this.emitSphere(cx, cy, color, 80);
          ZZ.flyStar(cx, cy - 20, 1);
        } else if (type === 'ring') {
          this.emitRing(cx, cy, color, 50);
          ZZ.flyStar(cx, cy - 20, 1);
        } else if (type === 'heart') {
          this.emitHeart(cx, cy, color, 40);
          ZZ.flyStar(cx, cy - 20, 2);
        } else if (type === 'chrysanthemum') {
          this.emitChrysanthemum(cx, cy, color, 60);
          ZZ.flyStar(cx, cy - 20, 2);
        } else if (type === 'willow') {
          this.emitWillow(cx, cy, color, 40);
          ZZ.flyStar(cx, cy - 20, 1);
        } else if (type === 'star') {
          this.emitStar(cx, cy, color, 40);
          ZZ.flyStar(cx, cy - 20, 2);
        }

        ZZ.playFirework();
        ZZ.vibrate(40);
      }

      emitSphere(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const speed = ZZ.rand(2, 5);
          particles.push(new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, color, ZZ.rand(2, 4), 0.015, 0.03));
        }
      }

      emitRing(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const speed = 4;
          particles.push(new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, color, 3, 0.012, 0.04));
        }
        // 内圈
        for (let i = 0; i < count / 2; i++) {
          const angle = (Math.PI * 2 / (count / 2)) * i;
          const speed = 2;
          particles.push(new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, '#fff', 2, 0.02, 0.03));
        }
      }

      emitHeart(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const t = (Math.PI * 2 / count) * i;
          // 心形参数方程
          const hx = 16 * Math.pow(Math.sin(t), 3);
          const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          const scale = 0.25;
          particles.push(new Particle(cx, cy, hx * scale, hy * scale, color, ZZ.rand(2, 4), 0.01, 0.02));
        }
      }

      emitChrysanthemum(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const speed = ZZ.rand(1, 6);
          particles.push(new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, color, ZZ.rand(1.5, 3), 0.008, 0.05));
        }
      }

      emitWillow(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const speed = ZZ.rand(1, 3);
          const p = new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, color, ZZ.rand(1, 2.5), 0.006, 0.08);
          p.gravity = 0.06;
          particles.push(p);
        }
      }

      emitStar(cx, cy, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          // 五角星效果 - 交替长短
          const isLong = i % 2 === 0;
          const speed = isLong ? ZZ.rand(4, 6) : ZZ.rand(1.5, 2.5);
          particles.push(new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, isLong ? color : '#FFF9C4', isLong ? 3 : 2, 0.012, 0.03));
        }
      }

      draw(ctx) {
        this.trail.forEach(t => {
          ctx.save();
          ctx.globalAlpha = t.life * 0.6;
          ctx.beginPath();
          ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
          ctx.restore();
        });
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }

    class Particle {
      constructor(x, y, vx, vy, color, size, decay, gravity) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size || 2;
        this.life = 1;
        this.decay = decay || 0.015;
        this.gravity = gravity || 0.04;
        this.trail = [];
      }
      update() {
        this.trail.push({ x: this.x, y: this.y, life: 0.4 });
        if (this.trail.length > 4) this.trail.shift();
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        // 拖尾
        this.trail.forEach((t, i) => {
          ctx.save();
          ctx.globalAlpha = t.life * this.life * 0.3;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
          ctx.restore();
        });
        // 粒子
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.restore();
      }
    }

    function showZhuzhuFirework(x, y) {
      const el = document.createElement('div');
      el.className = 'encouragement';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.textContent = '竹竹✨';
      el.style.fontSize = '2.5rem';
      el.style.color = '#FF6B9D';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
      ZZ.playCheer();
      ZZ.speak('竹竹的烟花！');
    }

    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      rockets.push(new Rocket(x + ZZ.rand(-20, 20), y));
      ZZ.maybeCheer(5);
    });

    // 首次引导烟花
    setTimeout(() => {
      rockets.push(new Rocket(W / 2, H * 0.3));
      setTimeout(() => rockets.push(new Rocket(W * 0.3, H * 0.25)), 400);
      setTimeout(() => rockets.push(new Rocket(W * 0.7, H * 0.28)), 800);
    }, 800);

    // 星星背景
    const stars = [];
    function initStars() {
      for (let i = 0; i < 80; i++) {
        stars.push({ x: ZZ.rand(0, W), y: ZZ.rand(0, H), r: ZZ.rand(0.3, 1.5), twinkle: ZZ.rand(0, Math.PI * 2), speed: ZZ.rand(0.02, 0.06) });
      }
    }
    initStars();

    function animate() {
      // 暗色拖尾
      ctx.fillStyle = 'rgba(13, 27, 42, 0.15)';
      ctx.fillRect(0, 0, W, H);

      // 星星
      stars.forEach(s => {
        s.twinkle += s.speed;
        const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.restore();
      });

      // 火箭
      for (let i = rockets.length - 1; i >= 0; i--) {
        rockets[i].update();
        if (!rockets[i].alive) rockets.splice(i, 1);
        else rockets[i].draw(ctx);
      }

      // 粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
        else particles[i].draw(ctx);
      }

      requestAnimationFrame(animate);
    }

    // 初始绘制
    ctx.fillStyle = '#0D1B2A';
    ctx.fillRect(0, 0, W, H);
    animate();
  </script>
</body>
</html>
